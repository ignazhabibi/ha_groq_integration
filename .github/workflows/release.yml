name: CI/CD Pipeline

env:
  PYTHON_VERSION: "3.14"

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  quality-check:
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/v') || !contains(github.ref_name, '-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install '.[dev]'
      - name: Lint & Format (Ruff)
        run: |
          ruff check .
          ruff format --check .
      - name: Type Check (mypy)
        run: python -m mypy
      - name: Tests
        run: python -m pytest -q

  release:
    needs: quality-check
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Build integration archive
        run: |
          mkdir -p dist
          archive="dist/groq_cloud_conversation.zip"
          test -f custom_components/groq_cloud_conversation/manifest.json
          test -f custom_components/groq_cloud_conversation/strings.json
          test -f custom_components/groq_cloud_conversation/stt.py
          test -f custom_components/groq_cloud_conversation/translations/en.json
          test -f custom_components/groq_cloud_conversation/brand/logo.png
          zip -r "$archive" \
            custom_components/groq_cloud_conversation \
            hacs.json \
            README.md \
            LICENSE \
            -x "*/__pycache__/*" "*.pyc"
          unzip -l "$archive"
      - name: Fetch Tag Message
        id: tag_message
        run: |
          git fetch --depth=1 origin +refs/tags/${{ github.ref_name }}:refs/tags/${{ github.ref_name }}
          TAG_MSG=$(git tag -l --format='%(contents:body)' ${{ github.ref_name }})
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$TAG_MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          body: ${{ steps.tag_message.outputs.body }}
          generate_release_notes: false
